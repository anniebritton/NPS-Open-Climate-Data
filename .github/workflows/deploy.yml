name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git rev-list --count HEAD is accurate

      - name: Fetch NPS arrowhead logo (Wikimedia Commons, PD file)
        run: |
          mkdir -p site/public
          # Non-fatal: if Wikimedia is unreachable, the nav falls back to
          # the text-only brand via onerror in Base.astro.
          curl -sSL --create-dirs --max-time 30 \
            -A "NPS-Open-Climate-Data-Build/1.0 (https://github.com/anniebritton/NPS-Open-Climate-Data)" \
            -o site/public/nps-logo.svg \
            "https://upload.wikimedia.org/wikipedia/commons/6/68/US-NationalParkService-Logo.svg" \
            || { echo "::warning::logo fetch failed"; rm -f site/public/nps-logo.svg; }
          if [ -f site/public/nps-logo.svg ] && ! head -c 200 site/public/nps-logo.svg | grep -q -i 'svg'; then
            echo "::warning::logo fetch did not return SVG; falling back"
            rm -f site/public/nps-logo.svg
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow

      - name: Build dynamic site data (merge slopes, carbon)
        run: |
          # Park JSON summaries and real PAD-US boundaries live under
          # site/public/data/ already — generated locally and committed
          # because neither EE (2–4 hr) nor the 2 GB PAD-US GDB is feasible
          # in CI.
          #
          # 05 merges fresh warming-slope props onto the committed real
          # polygons and writes all_parks.geojson. 04 records the carbon
          # estimate (grows with git history / timestamps).
          PYTHONPATH=. python scripts/05_generate_boundaries.py
          PYTHONPATH=. python scripts/04_write_carbon.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          SITE_BASE: "/NPS-Open-Climate-Data/"
          SITE_URL: "https://anniebritton.github.io"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
