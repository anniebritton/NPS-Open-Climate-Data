name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NPS arrowhead logo (Wikimedia Commons, PD file)
        run: |
          curl -sS -L \
            -A "NPS-Open-Climate-Data-Build/1.0 (https://github.com/anniebritton/NPS-Open-Climate-Data)" \
            -o site/public/nps-logo.svg \
            "https://upload.wikimedia.org/wikipedia/commons/6/68/US-NationalParkService-Logo.svg"
          # Sanity-check the download looks like SVG; otherwise remove so the
          # layout falls back cleanly to the text alt.
          if ! head -c 200 site/public/nps-logo.svg | grep -q -i 'svg'; then
            echo "::warning::logo fetch did not return SVG; falling back"
            rm -f site/public/nps-logo.svg
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow

      - name: Generate data + site JSON
        run: |
          PYTHONPATH=. python scripts/03_generate_demo_data.py
          PYTHONPATH=. python scripts/02_build_site_data.py
          mkdir -p site/public/data
          cp -r data/site/* site/public/data/
          mkdir -p site/public/data/raw
          for d in data/raw/*/; do
            slug=$(basename "$d")
            mkdir -p site/public/data/raw/$slug
            cp "$d"*.csv site/public/data/raw/$slug/
            gzip -f site/public/data/raw/$slug/*.csv
          done
          # Try PAD-US web services first for real polygons; whatever it
          # can't resolve, 05 fills in with circles. Both run after
          # 02_build_site_data so warming slopes are available to merge
          # into GeoJSON properties.
          PYTHONPATH=. python scripts/06_fetch_padus_boundaries.py || true
          PYTHONPATH=. python scripts/05_generate_boundaries.py
          # 04 runs last — it records commit count, timestamp, and how many
          # real vs circle boundaries this build ended up with.
          PYTHONPATH=. python scripts/04_write_carbon.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          SITE_BASE: "/NPS-Open-Climate-Data/"
          SITE_URL: "https://anniebritton.github.io"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
