name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow

      - name: Generate data + site JSON
        run: |
          PYTHONPATH=. python scripts/03_generate_demo_data.py
          PYTHONPATH=. python scripts/02_build_site_data.py
          PYTHONPATH=. python scripts/04_write_carbon.py
          mkdir -p site/public/data
          cp -r data/site/* site/public/data/
          mkdir -p site/public/data/raw
          for d in data/raw/*/; do
            slug=$(basename "$d")
            mkdir -p site/public/data/raw/$slug
            cp "$d"*.csv site/public/data/raw/$slug/
            gzip -f site/public/data/raw/$slug/*.csv
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          SITE_BASE: "/NPS-Open-Climate-Data/"
          SITE_URL: "https://anniebritton.github.io"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
