name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pytest pyarrow
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ -v --ignore=tests/test_basic.py
      - name: Verify CLAUDE.md and AGENTS.md are in sync
        run: |
          # The two files document the same project conventions for
          # different agent tools (Claude Code reads CLAUDE.md, Codex /
          # Cursor read AGENTS.md). They must contain identical content.
          diff -q CLAUDE.md AGENTS.md
